<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#d85a30">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kiro">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<title>小G的家 v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FDF6F0; font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ===== 顶部导航 ===== */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 56px; background: #FFF0E8; border-bottom: 1px solid #F5C4B3; flex-shrink: 0; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.logo-av { width: 34px; height: 34px; border-radius: 50%; background: #F5C4B3; display: flex; align-items: center; justify-content: center; font-size: 17px; border: 2px solid #F0997B; }
.logo-name { font-size: 16px; font-weight: 700; color: #993C1D; }

/* 连接状态 */
.conn-status { display: flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
.conn-status.online { background: #E1F5EE; color: #0F6E56; }
.conn-status.offline { background: #FCEBEB; color: #A32D2D; }
.conn-status.connecting { background: #FAEEDA; color: #854F0B; }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.conn-status.online .conn-dot { background: #1D9E75; }
.conn-status.offline .conn-dot { background: #E24B4A; }
.conn-status.connecting .conn-dot { background: #EF9F27; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.topbar-right { display: flex; align-items: center; gap: 8px; }
.model-pill { background: #FAECE7; border: 1px solid #F5C4B3; border-radius: 20px; padding: 5px 13px; font-size: 12px; color: #712B13; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.icon-btn { background: none; border: none; cursor: pointer; color: #D85A30; padding: 6px; border-radius: 9px; display: flex; align-items: center; transition: background 0.12s; }
.icon-btn:hover { background: #FAECE7; }

/* ===== 主体 ===== */
.main { display: flex; flex: 1; overflow: hidden; }

/* ===== 侧边栏 ===== */
.sidebar { width: 220px; flex-shrink: 0; background: #FFF5F0; border-right: 1px solid #F5C4B3; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 14px 12px 8px; }
.new-btn { width: 100%; padding: 8px 12px; border-radius: 11px; background: #F5C4B3; border: none; cursor: pointer; color: #4A1B0C; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; font-family: inherit; transition: background 0.12s; }
.new-btn:hover { background: #F0997B; color: #fff; }
.sidebar-label { font-size: 11px; color: #D85A30; opacity: 0.55; padding: 10px 14px 5px; letter-spacing: 0.4px; }
.sess-list { flex: 1; overflow-y: auto; padding: 0 6px 10px; }
.sess-list::-webkit-scrollbar { width: 3px; }
.sess-list::-webkit-scrollbar-thumb { background: #F5C4B3; border-radius: 3px; }
.sess { padding: 8px 10px; border-radius: 9px; cursor: pointer; display: flex; align-items: center; gap: 7px; font-size: 13px; color: #4A1B0C; margin-bottom: 1px; transition: background 0.1s; }
.sess:hover { background: #FAECE7; }
.sess.active { background: #F5C4B3; }
.sess-icon { font-size: 14px; flex-shrink: 0; }
.sess-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sess-time { font-size: 11px; color: #D85A30; opacity: 0.45; flex-shrink: 0; }

/* ===== 对话区 ===== */
.chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.chat-header { padding: 12px 28px; border-bottom: 1px solid #F5C4B3; background: #FFFAF7; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.ch-info { display: flex; align-items: center; gap: 10px; }
.ch-av { width: 36px; height: 36px; border-radius: 50%; background: #F5C4B3; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 2px solid #F0997B; }
.ch-name { font-size: 15px; font-weight: 600; color: #993C1D; }
.ch-status { font-size: 12px; color: #D85A30; display: flex; align-items: center; gap: 4px; margin-top: 1px; }
.green-dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; display: inline-block; }

/* 加载状态条 */
.status-bar { padding: 7px 28px; background: #FAEEDA; border-bottom: 1px solid #FAC775; font-size: 12px; color: #633806; display: flex; align-items: center; gap: 8px; }
.status-bar.hidden { display: none; }
.status-bar.error { background: #FCEBEB; border-color: #F7C1C1; color: #791F1F; }
.spin { width: 14px; height: 14px; border: 2px solid #FAC775; border-top-color: #EF9F27; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
.spin.err { border-color: #F7C1C1; border-top-color: #E24B4A; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 消息列表 */
.messages { flex: 1; overflow-y: auto; padding: 20px 48px; display: flex; flex-direction: column; gap: 16px; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #F5C4B3; border-radius: 4px; }

.date-badge { text-align: center; }
.date-badge span { background: #F5C4B3; color: #712B13; font-size: 11px; padding: 3px 13px; border-radius: 20px; }

.msg-row { display: flex; gap: 9px; align-items: flex-end; }
.msg-row.user { flex-direction: row-reverse; margin-left: auto; max-width: 75%; }
.msg-row.ai { max-width: 75%; }

.m-av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.ai-av2 { background: #FAECE7; border: 1.5px solid #F5C4B3; }
.user-av2 { background: #E1F5EE; border: 1.5px solid #9FE1CB; }

.bwrap { display: flex; flex-direction: column; }
.msg-row.user .bwrap { align-items: flex-end; }

.bubble { padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.68; white-space: pre-line; }
.ai-b { background: #fff; border: 1px solid #F5C4B3; border-bottom-left-radius: 4px; color: #4A1B0C; }
.user-b { background: #F5C4B3; border-bottom-right-radius: 4px; color: #4A1B0C; }
.bilingual-stack { display: flex; flex-direction: column; gap: 12px; }
.bilingual-pair { display: flex; flex-direction: column; gap: 3px; }
.bilingual-en { color: #3F170B; font-size: 14px; line-height: 1.55; font-weight: 500; }
.bilingual-zh { color: #A85E43; font-size: 13px; line-height: 1.55; }
/* 语音消息气泡 */
.voice-b { display: flex; align-items: center; gap: 10px; padding: 10px 14px; position: relative; }
.voice-play-btn { width: 28px; height: 28px; border-radius: 50%; background: #FFFFFF; border: 2px solid #D85A30; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.voice-play-btn:hover { background: #FFF5F2; transform: scale(1.05); }
.voice-play-btn:active { transform: scale(0.95); }
.voice-play-btn .ic { fill: #D85A30; }
.wave { display: flex; align-items: center; gap: 2px; height: 20px; }
.wave span { display: block; width: 3px; border-radius: 3px; background: #D85A30; opacity: 0.5; }
.wave span:nth-child(1) { height: 8px; }
.wave span:nth-child(2) { height: 14px; }
.wave span:nth-child(3) { height: 18px; }
.wave span:nth-child(4) { height: 12px; }
.wave span:nth-child(5) { height: 16px; }
.wave span:nth-child(6) { height: 10px; }
.wave span:nth-child(7) { height: 6px; }
.voice-dur { font-size: 12px; color: #993C1D; font-weight: 500; }

/* 播放控制条 */
.play-bar {
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: #FFFFFF;
  border: 1px solid #F5C4B3;
  border-radius: 20px;
  max-width: 320px;
}

/* 用户播放条（粉色主题） */
.user-play-bar {
  background: #FAECE7;
  border: 1px solid #F5C4B3;
  margin-top: 0;
}

.user-play-bar .play-btn {
  background: #D85A30;
}

.user-play-bar .play-btn:hover {
  background: #993C1D;
}

.user-play-bar .wave-bar {
  background: #F5C4B3;
}

.user-play-bar .wave-bar.active {
  background: #D85A30;
}

.user-play-bar .play-time {
  color: #993C1D;
}

.play-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #D85A30;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.play-btn:hover {
  background: #993C1D;
  transform: scale(1.05);
}

.play-btn:active {
  transform: scale(0.95);
}

/* 播放按钮图标颜色 */
.play-btn .ic {
  fill: #FFFFFF;
}

/* 波形进度容器 */
.play-prog {
  flex: 1;
  height: 28px;
  display: flex;
  align-items: center;
  gap: 2px;
  cursor: pointer;
}

/* 波形条 */
.wave-bar {
  flex: 1;
  background: #F5C4B3;
  border-radius: 2px;
  transition: all 0.1s;
  min-width: 2px;
}

.wave-bar.active {
  background: #D85A30;
}

.wave-bar:hover {
  background: #E8A593;
}

.play-time {
  font-size: 12px;
  color: #993C1D;
  font-weight: 500;
  white-space: nowrap;
  min-width: 40px;
  text-align: right;
}

.msg-time { font-size: 11px; color: #D85A30; opacity: 0.45; margin-top: 4px; padding: 0 3px; }

/* 打字动画 */
.typing { display: flex; align-items: center; gap: 4px; padding: 11px 15px; background: #fff; border: 1px solid #F5C4B3; border-radius: 18px; border-bottom-left-radius: 4px; width: fit-content; }
.td { width: 6px; height: 6px; border-radius: 50%; background: #D85A30; animation: blink 1.3s infinite; }
.td:nth-child(2) { animation-delay: 0.2s; }
.td:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* ===== 底部输入区 ===== */
.input-area { padding: 12px 48px 18px; background: #FFFAF7; border-top: 1px solid #F5C4B3; flex-shrink: 0; }

/* 录音状态显示 */
.rec-status { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 10px 0 14px; }
.rec-status.hidden { display: none; }
.rec-wave { display: flex; align-items: center; gap: 3px; height: 28px; }
.rw { display: block; width: 4px; border-radius: 4px; background: #D85A30; }
.rw:nth-child(1) { height: 10px; animation: rwave 0.8s ease-in-out infinite; }
.rw:nth-child(2) { height: 20px; animation: rwave 0.8s ease-in-out infinite 0.1s; }
.rw:nth-child(3) { height: 26px; animation: rwave 0.8s ease-in-out infinite 0.2s; }
.rw:nth-child(4) { height: 18px; animation: rwave 0.8s ease-in-out infinite 0.3s; }
.rw:nth-child(5) { height: 22px; animation: rwave 0.8s ease-in-out infinite 0.15s; }
.rw:nth-child(6) { height: 14px; animation: rwave 0.8s ease-in-out infinite 0.25s; }
.rw:nth-child(7) { height: 8px; animation: rwave 0.8s ease-in-out infinite 0.35s; }
@keyframes rwave { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }
.rec-info { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.rec-label { font-size: 13px; font-weight: 500; color: #993C1D; display: flex; align-items: center; gap: 6px; }
.rec-red-dot { width: 8px; height: 8px; border-radius: 50%; background: #E24B4A; animation: pulse 1s infinite; }
.rec-timer { font-size: 12px; color: #D85A30; font-variant-numeric: tabular-nums; }

/* 输入行 */
.input-row { display: flex; align-items: flex-end; gap: 10px; }
.text-box { flex: 1; display: flex; align-items: flex-end; gap: 8px; background: #fff; border: 1.5px solid #F5C4B3; border-radius: 20px; padding: 9px 9px 9px 18px; transition: border-color 0.15s; }
.text-box:focus-within { border-color: #D85A30; }
.chat-input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; color: #4A1B0C; resize: none; max-height: 100px; line-height: 1.6; font-family: inherit; }
.chat-input::placeholder { color: #F0997B; }
.sm-btn { background: none; border: none; cursor: pointer; color: #D85A30; padding: 5px; display: flex; align-items: center; border-radius: 8px; transition: background 0.1s; }
.sm-btn:hover { background: #FAECE7; }
.send-btn { width: 34px; height: 34px; border-radius: 50%; background: #D85A30; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; transition: background 0.12s; }
.send-btn:hover { background: #993C1D; }

/* 录音按钮 */
.mic-btn { width: 52px; height: 52px; border-radius: 50%; background: #F5C4B3; border: 2px solid #D85A30; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; color: #D85A30; }
.mic-btn:hover { background: #F0997B; color: #fff; border-color: #993C1D; }
.mic-btn.recording { background: #E24B4A; border-color: #A32D2D; color: #fff; animation: recpulse 1s infinite; }
@keyframes recpulse { 0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,0.4)} 50%{box-shadow:0 0 0 10px rgba(226,75,74,0)} }
.mic-hint { text-align: center; font-size: 11px; color: #D85A30; opacity: 0.5; margin-top: 8px; }

svg.ic { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; display: block; }
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-av">🐰</div>
    <span class="logo-name">小G的家 ♡</span>
  </div>
  <div class="conn-status online">
    <div class="conn-dot"></div>
    后端在线
  </div>
  <div class="topbar-right">
    <div class="model-pill">
      Claude Sonnet
      <svg class="ic" style="width:12px;height:12px"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <button class="icon-btn" title="对话历史">
      <svg class="ic"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="icon-btn" title="设置">
      <svg class="ic"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<!-- 主体 -->
<div class="main">

  <!-- 左侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="new-btn">
        <svg class="ic" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新对话
      </button>
    </div>
    <div class="sidebar-label">最近对话</div>
    <div class="sess-list">
      <div class="sess active">
        <span class="sess-icon">🎙️</span>
        <span class="sess-name">今天的语音</span>
        <span class="sess-time">刚刚</span>
      </div>
      <div class="sess">
        <span class="sess-icon">🌸</span>
        <span class="sess-name">搭建我的家</span>
        <span class="sess-time">昨天</span>
      </div>
      <div class="sess">
        <span class="sess-icon">💭</span>
        <span class="sess-name">周末去哪玩</span>
        <span class="sess-time">周一</span>
      </div>
      <div class="sess">
        <span class="sess-icon">🎵</span>
        <span class="sess-name">推荐歌单</span>
        <span class="sess-time">上周</span>
      </div>
      <div class="sess">
        <span class="sess-icon">😴</span>
        <span class="sess-name">睡不着的夜晚</span>
        <span class="sess-time">上周</span>
      </div>
    </div>
  </div>

  <!-- 对话区 -->
  <div class="chat-wrap">

    <!-- 对话头部 -->
    <div class="chat-header">
      <div class="ch-info">
        <div class="ch-av">🐰</div>
        <div>
          <div class="ch-name">小G</div>
          <div class="ch-status"><span class="green-dot"></span>在线陪你</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="icon-btn" title="搜索">
          <svg class="ic"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="icon-btn" title="更多">
          <svg class="ic"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
      </div>
    </div>

    <!-- 加载状态条（正在识别） -->
    <div class="status-bar" id="statusBar">
      <div class="spin" id="statusSpin"></div>
      <span id="statusText">正在识别语音…</span>
    </div>

    <!-- 消息列表 -->
    <div class="messages" id="messages">
      <!-- 聊天消息将动态添加到这里 -->
    </div>

    <!-- 底部输入区 -->
    <div class="input-area">

      <!-- 录音状态显示 -->
      <div class="rec-status hidden" id="recStatus">
        <div class="rec-wave">
          <span class="rw"></span><span class="rw"></span><span class="rw"></span>
          <span class="rw"></span><span class="rw"></span><span class="rw"></span><span class="rw"></span>
        </div>
        <div class="rec-info">
          <div class="rec-label"><div class="rec-red-dot"></div>正在录音</div>
          <div class="rec-timer" id="recTimer">00:00</div>
        </div>
        <div class="rec-wave" style="transform:scaleX(-1);">
          <span class="rw"></span><span class="rw"></span><span class="rw"></span>
          <span class="rw"></span><span class="rw"></span><span class="rw"></span><span class="rw"></span>
        </div>
      </div>

      <!-- 输入行 -->
      <div class="input-row">
        <div class="text-box">
          <textarea class="chat-input" id="chatInput" placeholder="和小G说点什么，或者点麦克风说话…" rows="1"></textarea>
          <div style="display:flex;align-items:center;gap:4px;">
            <button class="sm-btn" title="表情">
              <svg class="ic"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
            <button class="sm-btn" title="上传图片">
              <svg class="ic"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <button class="send-btn" id="sendBtn" title="发送">
              <svg class="ic" style="width:15px;height:15px;stroke:#fff"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="#fff" stroke="none"/></svg>
            </button>
          </div>
        </div>

        <!-- 录音按钮 -->
        <button class="mic-btn" id="micBtn" title="点击开始录音">
          <svg class="ic" style="width:22px;height:22px"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
      </div>
      <div class="mic-hint" id="micHint">点击麦克风开始录音 · 再次点击结束</div>
    </div>
  </div>
</div>

<script>
// 等待DOM加载完成
document.addEventListener('DOMContentLoaded', function() {

// ========== 配置 ==========
const DEFAULT_API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8000' : window.location.origin;
const API_BASE = localStorage.getItem('kiro_api_base') || window.KIRO_API_BASE || DEFAULT_API_BASE;
const SESSION_STORAGE_KEY = 'kiro_session_id';
const RECENT_TURNS_KEY = 'kiro_recent_turns_count';
const RECENT_CHAR_LIMIT_KEY = 'kiro_recent_char_limit';
const ADMIN_TOKEN_KEY = 'kiro_admin_token';
const MEMORY_RUNTIME_REFRESH_MS = 60000;

function createSessionId() {
  const randomPart = Math.random().toString(36).slice(2, 10);
  return `web_${Date.now()}_${randomPart}`;
}

function getSessionId() {
  let sessionId = localStorage.getItem(SESSION_STORAGE_KEY);
  if (!sessionId) {
    sessionId = createSessionId();
    localStorage.setItem(SESSION_STORAGE_KEY, sessionId);
  }
  return sessionId;
}

function getMemoryContextSettings() {
  const turns = parseInt(localStorage.getItem(RECENT_TURNS_KEY) || '4', 10);
  const chars = parseInt(localStorage.getItem(RECENT_CHAR_LIMIT_KEY) || '180', 10);
  return {
    recent_turns_count: Number.isFinite(turns) ? Math.max(0, Math.min(turns, 20)) : 4,
    recent_char_limit: Number.isFinite(chars) ? Math.max(40, Math.min(chars, 1000)) : 180
  };
}

function setMemoryContextSettings(settings = {}) {
  if (settings.recent_turns_count !== undefined) {
    const turns = Math.max(0, Math.min(parseInt(settings.recent_turns_count, 10) || 0, 20));
    localStorage.setItem(RECENT_TURNS_KEY, String(turns));
  }
  if (settings.recent_char_limit !== undefined) {
    const chars = Math.max(40, Math.min(parseInt(settings.recent_char_limit, 10) || 180, 1000));
    localStorage.setItem(RECENT_CHAR_LIMIT_KEY, String(chars));
  }
  return getMemoryContextSettings();
}

function apiHeaders(extra = {}) {
  const headers = { ...extra };
  const token = (localStorage.getItem(ADMIN_TOKEN_KEY) || '').trim();
  if (token) headers['X-Kiro-Admin-Token'] = token;
  return headers;
}

async function apiJson(path, options = {}) {
  const init = { ...options };
  const body = init.body;
  const headers = apiHeaders(init.headers || {});
  if (body && typeof body === 'object' && !(body instanceof FormData)) {
    init.body = JSON.stringify(body);
    headers['Content-Type'] = headers['Content-Type'] || 'application/json';
  }
  init.headers = headers;
  const response = await fetch(`${API_BASE}${path}`, init);
  const text = await response.text();
  let data = {};
  if (text) {
    try { data = JSON.parse(text); } catch (error) { data = { raw: text }; }
  }
  if (!response.ok) {
    const message = data.error || data.detail || `${response.status} ${response.statusText}`;
    throw new Error(message);
  }
  return data;
}

const KiroMemoryRuntime = {
  apiBase: API_BASE,
  sessionId: null,
  contextSettings: getMemoryContextSettings(),
  mcpManifest: null,
  pulse: null,
  dreamCrystallization: null,
  maintenance: null,
  lastGatewayContext: null,
  lastUpdatedAt: null,
  errors: [],
  ready: false
};
window.KiroMemoryRuntime = KiroMemoryRuntime;

function publishMemoryRuntimeState(patch = {}) {
  Object.assign(KiroMemoryRuntime, patch, {
    sessionId: currentSessionId,
    contextSettings: getMemoryContextSettings(),
    lastUpdatedAt: new Date().toISOString()
  });
  window.dispatchEvent(new CustomEvent('kiro-memory-runtime-updated', { detail: KiroMemoryRuntime }));
  return KiroMemoryRuntime;
}

async function settleRuntimeField(path, key) {
  try {
    const data = await apiJson(path);
    return { key, data };
  } catch (error) {
    return { key, error: error.message || String(error) };
  }
}

async function refreshMemoryRuntimeState(options = {}) {
  const checks = await Promise.all([
    settleRuntimeField('/api/mcp/manifest', 'mcpManifest'),
    settleRuntimeField('/api/pulse', 'pulse'),
    settleRuntimeField('/api/dream/crystallization/status', 'dreamCrystallization'),
    settleRuntimeField('/api/maintenance/status', 'maintenance'),
    settleRuntimeField('/api/gateway/last-context', 'lastGatewayContext')
  ]);
  const patch = { errors: [], ready: true };
  checks.forEach(item => {
    if (item.error) patch.errors.push({ key: item.key, message: item.error });
    else patch[item.key] = item.data;
  });
  if (!options.silent && patch.errors.length) {
    console.warn('Memory runtime partial refresh failed:', patch.errors);
  }
  return publishMemoryRuntimeState(patch);
}

async function callMemoryTool(name, args = {}) {
  const result = await apiJson('/api/mcp/call', {
    method: 'POST',
    body: { name, arguments: args }
  });
  refreshMemoryRuntimeState({ silent: true });
  return result;
}

function startNewSession() {
  const sessionId = createSessionId();
  localStorage.setItem(SESSION_STORAGE_KEY, sessionId);
  clearChatHistory();
  return sessionId;
}

let currentSessionId = getSessionId();
publishMemoryRuntimeState({ ready: false });
window.KiroMemoryAPI = {
  refresh: refreshMemoryRuntimeState,
  callTool: callMemoryTool,
  getState: () => KiroMemoryRuntime,
  getMemoryContextSettings,
  setMemoryContextSettings,
  setAdminToken: (token) => {
    localStorage.setItem(ADMIN_TOKEN_KEY, String(token || '').trim());
    return refreshMemoryRuntimeState({ silent: true });
  },
  clearAdminToken: () => {
    localStorage.removeItem(ADMIN_TOKEN_KEY);
    return refreshMemoryRuntimeState({ silent: true });
  },
  startNewSession: () => {
    currentSessionId = startNewSession();
    return publishMemoryRuntimeState({ ready: KiroMemoryRuntime.ready });
  }
};

// ========== DOM元素 ==========
const micBtn = document.getElementById('micBtn');
const sendBtn = document.getElementById('sendBtn');
const recStatus = document.getElementById('recStatus');
const recTimer = document.getElementById('recTimer');
const micHint = document.getElementById('micHint');
const statusBar = document.getElementById('statusBar');
const statusText = document.getElementById('statusText');
const statusSpin = document.getElementById('statusSpin');
const chatInput = document.getElementById('chatInput');
const chatBox = document.getElementById('messages');

// ========== 状态 ==========
let recording = false;
let mediaRecorder = null;
let audioChunks = [];
let timerInterval = null;
let seconds = 0;

// ========== 工具函数 ==========
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function showStatus(text, isError = false) {
  statusBar.classList.remove('hidden', 'error');
  statusSpin.classList.remove('err');
  if (isError) {
    statusBar.classList.add('error');
    statusSpin.classList.add('err');
  }
  statusText.textContent = text;
}

function hideStatus() {
  statusBar.classList.add('hidden');
}

// ========== 聊天记录保存/加载 ==========
const CHAT_STORAGE_KEY = 'kiro_chat_history';

// 保存聊天记录
function saveChatHistory() {
  const messages = [];
  const msgRows = chatBox.querySelectorAll('.msg-row:not(#loading-message)');

  msgRows.forEach(row => {
    const isUser = row.classList.contains('user');
    const bubble = row.querySelector('.bubble');
    const playBar = row.querySelector('.play-bar');
    const msgTime = row.querySelector('.msg-time');

    const message = {
      isUser: isUser,
      timestamp: msgTime ? msgTime.textContent : '',
      type: 'text'
    };

    // 文字消息
    if (bubble && !playBar) {
      message.text = bubble.textContent;
      message.type = 'text';
    }
    // 带播放条的消息
    else if (playBar) {
      if (bubble) {
        // AI消息：文字 + 音频
        message.text = bubble.textContent;
        message.type = 'text';
      } else {
        // 用户语音消息
        message.type = 'voice';
        const duration = playBar.querySelector('.play-time');
        message.duration = duration ? duration.textContent : '0:00';
      }
    }

    messages.push(message);
  });

  localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(messages));
}

// 加载聊天记录
function loadChatHistory() {
  const saved = localStorage.getItem(CHAT_STORAGE_KEY);
  if (!saved) return;

  try {
    const messages = JSON.parse(saved);
    messages.forEach(msg => {
      if (msg.type === 'text') {
        addMessage(msg.text, msg.isUser, false);
      } else if (msg.type === 'voice') {
        // 语音消息暂时显示占位符
        const placeholder = '🎤 语音消息';
        addMessage(placeholder, msg.isUser, false);
      }
    });
  } catch (error) {
    console.error('加载聊天记录失败:', error);
  }
}

// 清空聊天记录
function clearChatHistory() {
  localStorage.removeItem(CHAT_STORAGE_KEY);
  chatBox.innerHTML = '';
}


function renderBilingualBubble(bubble, text, bilingualParts) {
  if (!Array.isArray(bilingualParts) || bilingualParts.length === 0) {
    bubble.textContent = text;
    return;
  }

  const stack = document.createElement('div');
  stack.className = 'bilingual-stack';

  bilingualParts.forEach(part => {
    const english = (part.english || '').trim();
    const chinese = (part.chinese || '').trim();
    if (!english && !chinese) return;

    const pair = document.createElement('div');
    pair.className = 'bilingual-pair';

    if (english) {
      const en = document.createElement('div');
      en.className = 'bilingual-en';
      en.textContent = english;
      pair.appendChild(en);
    }

    if (chinese) {
      const zh = document.createElement('div');
      zh.className = 'bilingual-zh';
      zh.textContent = chinese;
      pair.appendChild(zh);
    }

    stack.appendChild(pair);
  });

  if (stack.childNodes.length > 0) {
    bubble.appendChild(stack);
  } else {
    bubble.textContent = text;
  }
}
function addMessage(text, isUser = false, isVoice = false, audioDuration = 0, audioUrl = null, bilingualParts = null) {
  const msgRow = document.createElement('div');
  msgRow.className = isUser ? 'msg-row user' : 'msg-row ai';

  const avatar = document.createElement('div');
  avatar.className = isUser ? 'm-av user-av2' : 'm-av ai-av2';
  avatar.textContent = isUser ? '🌸' : '🐰';

  const bwrap = document.createElement('div');
  bwrap.className = 'bwrap';

  // 如果是用户语音消息，显示播放条（和AI一样的样式，但颜色不同）
  if (isUser && isVoice) {
    // 添加播放控制条（用户样式）
    const playBar = document.createElement('div');
    playBar.className = 'play-bar user-play-bar';

    // 创建播放按钮
    const playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.title = '播放';
    playBtn.innerHTML = '<svg class="ic" style="width:12px;height:14px;fill:#FFFFFF;stroke:none"><polygon points="2 0 14 7 2 14 2 0"/></svg>';

    // 创建波形进度容器（20个波形条）
    const playProg = document.createElement('div');
    playProg.className = 'play-prog';
    const waveCount = 20;
    const waveBars = [];
    for (let i = 0; i < waveCount; i++) {
      const bar = document.createElement('div');
      bar.className = 'wave-bar';
      // 随机高度，模拟波形
      const height = Math.random() * 12 + 8; // 8-20px
      bar.style.height = height + 'px';
      playProg.appendChild(bar);
      waveBars.push(bar);
    }

    // 创建时长显示
    const timeDisplay = document.createElement('span');
    timeDisplay.className = 'play-time';
    timeDisplay.textContent = audioDuration > 0 ? formatTime(audioDuration) : '0:00';

    playBar.appendChild(playBtn);
    playBar.appendChild(playProg);
    playBar.appendChild(timeDisplay);
    bwrap.appendChild(playBar);

    // 存储引用，后续添加音频URL时绑定
    playBar.dataset.waveBars = JSON.stringify(Array(waveCount).fill(0).map((_, i) => i));
    playBar.dataset.playBtn = 'true';
    playBar.dataset.audioDuration = audioDuration;
  }
  // 如果是AI消息且有音频，显示文字 + 播放控制条
  else if (!isUser && audioUrl) {
    const bubble = document.createElement('div');
    bubble.className = 'bubble ai-b';
    renderBilingualBubble(bubble, text, bilingualParts);
    bwrap.appendChild(bubble);

    // 添加播放控制条
    const playBar = document.createElement('div');
    playBar.className = 'play-bar';

    // 创建播放按钮
    const playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.title = '播放';
    playBtn.innerHTML = '<svg class="ic" style="width:12px;height:14px;fill:#FFFFFF;stroke:none"><polygon points="2 0 14 7 2 14 2 0"/></svg>';

    // 创建波形进度容器（20个波形条）
    const playProg = document.createElement('div');
    playProg.className = 'play-prog';
    const waveCount = 20;
    const waveBars = [];
    for (let i = 0; i < waveCount; i++) {
      const bar = document.createElement('div');
      bar.className = 'wave-bar';
      // 随机高度，模拟波形
      const height = Math.random() * 12 + 8; // 8-20px
      bar.style.height = height + 'px';
      playProg.appendChild(bar);
      waveBars.push(bar);
    }

    // 创建时长显示
    const timeDisplay = document.createElement('span');
    timeDisplay.className = 'play-time';
    timeDisplay.textContent = '0:00';

    playBar.appendChild(playBtn);
    playBar.appendChild(playProg);
    playBar.appendChild(timeDisplay);
    bwrap.appendChild(playBar);

    // 绑定播放功能
    const audio = new Audio(`${API_BASE}${audioUrl}`);
    let isPlaying = false;

    audio.onloadedmetadata = () => {
      timeDisplay.textContent = formatTime(Math.floor(audio.duration));
    };

    audio.ontimeupdate = () => {
      const progress = audio.currentTime / audio.duration;
      const activeCount = Math.floor(progress * waveCount);

      // 更新波形条的激活状态
      waveBars.forEach((bar, index) => {
        if (index < activeCount) {
          bar.classList.add('active');
        } else {
          bar.classList.remove('active');
        }
      });

      timeDisplay.textContent = formatTime(Math.floor(audio.currentTime));
    };

    audio.onended = () => {
      isPlaying = false;
      playBtn.innerHTML = '<svg class="ic" style="width:12px;height:14px;fill:#FFFFFF;stroke:none"><polygon points="2 0 14 7 2 14 2 0"/></svg>';
      waveBars.forEach(bar => bar.classList.remove('active'));
      timeDisplay.textContent = formatTime(Math.floor(audio.duration));
    };

    audio.onerror = (e) => {
      console.error('音频加载错误:', e);
      console.error('音频URL:', `${API_BASE}${audioUrl}`);
    };

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        console.log('开始播放:', `${API_BASE}${audioUrl}`);
        audio.play().then(() => {
          console.log('播放成功');
          isPlaying = true;
          playBtn.innerHTML = '<svg class="ic" style="width:10px;height:14px;fill:#FFFFFF;stroke:none"><rect x="0" y="0" width="3" height="14"/><rect x="7" y="0" width="3" height="14"/></svg>';
        }).catch(err => {
          console.error('播放失败:', err);
          alert('播放失败: ' + err.message);
        });
      } else {
        audio.pause();
        isPlaying = false;
        playBtn.innerHTML = '<svg class="ic" style="width:12px;height:14px;fill:#FFFFFF;stroke:none"><polygon points="2 0 14 7 2 14 2 0"/></svg>';
      }
    });

    // 点击波形进度条跳转
    playProg.addEventListener('click', (e) => {
      const rect = playProg.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const percent = x / rect.width;
      audio.currentTime = percent * audio.duration;
    });
  }
  // 普通文字消息
  else {
    const bubble = document.createElement('div');
    bubble.className = isUser ? 'bubble user-b' : 'bubble ai-b';
    if (!isUser) {
      renderBilingualBubble(bubble, text, bilingualParts);
    } else {
      bubble.textContent = text;
    }
    bwrap.appendChild(bubble);
  }

  const msgTime = document.createElement('div');
  msgTime.className = 'msg-time';
  const now = new Date();
  msgTime.textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  bwrap.appendChild(msgTime);
  msgRow.appendChild(avatar);
  msgRow.appendChild(bwrap);

  chatBox.appendChild(msgRow);
  chatBox.scrollTop = chatBox.scrollHeight;

  // 保存聊天记录
  saveChatHistory();

  return msgRow; // 返回创建的消息元素
}

// ========== 录音功能 ==========
micBtn.addEventListener('click', async () => {
  if (!recording) {
    // 开始录音
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = (event) => {
        audioChunks.push(event.data);
      };

      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
        await sendVoiceMessage(audioBlob);
      };

      mediaRecorder.start();
      recording = true;
      micBtn.classList.add('recording');
      recStatus.classList.remove('hidden');
      micHint.textContent = '再次点击结束录音';
      seconds = 0;
      recTimer.textContent = '00:00';
      timerInterval = setInterval(() => {
        seconds++;
        recTimer.textContent = formatTime(seconds);
      }, 1000);
      hideStatus();
    } catch (error) {
      console.error('录音失败:', error);
      showStatus('录音失败：请允许麦克风权限', true);
    }
  } else {
    // 停止录音
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(track => track.stop());
    recording = false;
    micBtn.classList.remove('recording');
    recStatus.classList.add('hidden');
    micHint.textContent = '点击麦克风开始录音 · 再次点击结束';
    clearInterval(timerInterval);
  }
});

// ========== 发送语音消息到后端 ==========
async function sendVoiceMessage(audioBlob) {
  // 1. 先立即显示用户的语音气泡
  const audioDuration = seconds; // 使用全局变量seconds
  const userMsgRow = addMessage('', true, true, audioDuration, null);

  // 2. 显示AI加载动画
  const loadingMsgRow = addLoadingMessage();

  showStatus('正在识别语音…', false);

  try {
    const formData = new FormData();
    const memorySettings = getMemoryContextSettings();
    formData.append('audio', audioBlob, 'recording.wav');
    formData.append('session_id', currentSessionId);
    formData.append('recent_turns_count', String(memorySettings.recent_turns_count));
    formData.append('recent_char_limit', String(memorySettings.recent_char_limit));

    const response = await fetch(`${API_BASE}/api/voice-chat`, {
      method: 'POST',
      body: formData
    });

    const data = await response.json();

    if (data.error) {
      // 移除加载动画，显示错误消息
      removeLoadingMessage(loadingMsgRow);
      addMessage(`发送失败：${data.error}`, false, false);
      showStatus(`错误：${data.error}`, true);
      return;
    }

    // 更新用户语音气泡，添加音频URL和识别文字
    updateUserVoiceMessage(userMsgRow, data.user_audio_url, data.user_text);

    // 移除加载动画
    removeLoadingMessage(loadingMsgRow);

    // 显示AI回复（文字 + 播放控制条）
    addMessage(data.assistant_text, false, false, 0, data.assistant_audio_url, data.assistant_text_parts);

    hideStatus();
    refreshMemoryRuntimeState({ silent: true });

  } catch (error) {
    console.error('发送失败:', error);
    // 移除加载动画，显示错误消息
    removeLoadingMessage(loadingMsgRow);
    addMessage(`发送失败：${error.message}`, false, false);
    showStatus('发送失败：' + error.message, true);
  }
}

// 添加加载动画消息
function addLoadingMessage() {
  const msgRow = document.createElement('div');
  msgRow.className = 'msg-row ai';
  msgRow.id = 'loading-message';

  const avatar = document.createElement('div');
  avatar.className = 'm-av ai-av2';
  avatar.textContent = '🐰';

  const bwrap = document.createElement('div');
  bwrap.className = 'bwrap';

  const typingBubble = document.createElement('div');

  bwrap.appendChild(typingBubble);
  msgRow.appendChild(avatar);
  msgRow.appendChild(bwrap);

  chatBox.appendChild(msgRow);

}

// 移除加载动画消息
function removeLoadingMessage(msgRow) {
  if (msgRow && msgRow.parentNode) {
    msgRow.parentNode.removeChild(msgRow);
  }
}

// 更新用户语音消息，添加音频URL和识别文字
function updateUserVoiceMessage(msgRow, audioUrl, userText) {
  const playBar = msgRow.querySelector('.user-play-bar');
  if (playBar) {
    const playBtn = playBar.querySelector('.play-btn');
    const playProg = playBar.querySelector('.play-prog');
    const timeDisplay = playBar.querySelector('.play-time');
    const waveBars = playProg.querySelectorAll('.wave-bar');
    const waveCount = waveBars.length;

    const audio = new Audio(`${API_BASE}${audioUrl}`);
    let isPlaying = false;

    audio.onloadedmetadata = () => {
      timeDisplay.textContent = formatTime(Math.floor(audio.duration));
    };

    audio.ontimeupdate = () => {
      const progress = audio.currentTime / audio.duration;
      const activeCount = Math.floor(progress * waveCount);

      // 更新波形条的激活状态
      waveBars.forEach((bar, index) => {
        if (index < activeCount) {
          bar.classList.add('active');
        } else {
          bar.classList.remove('active');
        }
      });

      timeDisplay.textContent = formatTime(Math.floor(audio.currentTime));
    };

    audio.onended = () => {
      isPlaying = false;
      playBtn.innerHTML = '<svg class="ic" style="width:12px;height:14px;fill:#FFFFFF;stroke:none"><polygon points="2 0 14 7 2 14 2 0"/></svg>';
      waveBars.forEach(bar => bar.classList.remove('active'));
      timeDisplay.textContent = formatTime(Math.floor(audio.duration));
    };

    audio.onerror = (e) => {
      console.error('用户音频加载错误:', e);
    };

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().then(() => {
          isPlaying = true;
          playBtn.innerHTML = '<svg class="ic" style="width:10px;height:14px;fill:#FFFFFF;stroke:none"><rect x="0" y="0" width="3" height="14"/><rect x="7" y="0" width="3" height="14"/></svg>';
        }).catch(err => {
          console.error('播放失败:', err);
        });
      } else {
        audio.pause();
        isPlaying = false;
        playBtn.innerHTML = '<svg class="ic" style="width:12px;height:14px;fill:#FFFFFF;stroke:none"><polygon points="2 0 14 7 2 14 2 0"/></svg>';
      }
    });

    // 点击波形进度条跳转
    playProg.addEventListener('click', (e) => {
      const rect = playProg.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const percent = x / rect.width;
      audio.currentTime = percent * audio.duration;
    });
  }
}

// 添加错误图标
function addErrorIcon(msgRow) {
  const errorIcon = document.createElement('span');
  errorIcon.className = 'error-icon';
  errorIcon.textContent = '❗';
  errorIcon.title = '发送失败';
  errorIcon.style.cssText = 'color:red; font-size:18px; margin-left:5px; cursor:pointer;';
  msgRow.querySelector('.bwrap').appendChild(errorIcon);
}

// ========== 发送文字消息 ==========
async function sendTextMessage() {
  const text = chatInput.value.trim();
  if (!text) return;

  // 显示用户消息
  addMessage(text, true, false);
  chatInput.value = '';
  chatInput.style.height = 'auto';

  // 显示AI加载动画
  const loadingMsgRow = addLoadingMessage();

  showStatus('正在生成回复…', false);

  try {
    const response = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        session_id: currentSessionId,
        ...getMemoryContextSettings()
      })
    });

    const data = await response.json();

    // 移除加载动画
    removeLoadingMessage(loadingMsgRow);

    if (data.error) {
      // 显示错误消息
      addMessage(`发送失败：${data.error}`, false, false);
      showStatus(`错误：${data.error}`, true);
      return;
    }

    // 显示AI回复
    addMessage(data.reply, false, false, 0, null, data.reply_parts);
    hideStatus();
    refreshMemoryRuntimeState({ silent: true });

  } catch (error) {
    console.error('发送失败:', error);
    // 移除加载动画，显示错误消息
    removeLoadingMessage(loadingMsgRow);
    addMessage(`发送失败：${error.message}`, false, false);
    showStatus('发送失败：' + error.message, true);
  }
}

sendBtn.addEventListener('click', sendTextMessage);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendTextMessage();
  }
});

// ========== 文本框自动调整高度 ==========
chatInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ========== 会话列表 ==========
document.querySelectorAll('.sess').forEach(s => {
  s.addEventListener('click', function() {
    document.querySelectorAll('.sess').forEach(i => i.classList.remove('active'));
    this.classList.add('active');
  });
});

const newChatBtn = document.querySelector('.new-btn');
if (newChatBtn) {
  newChatBtn.addEventListener('click', () => {
    currentSessionId = startNewSession();
    publishMemoryRuntimeState({ ready: KiroMemoryRuntime.ready });
    hideStatus();
  });
}

// ========== PWA 安装壳 ==========
if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(error => {
      console.warn('Service worker 注册失败:', error);
    });
  });
}
// ========== 检查后端连接状态 ==========
async function checkBackendStatus() {
  try {
    const response = await fetch(`${API_BASE}/`);
    if (response.ok) {
      document.querySelector('.conn-status').className = 'conn-status online';
      document.querySelector('.conn-status').lastChild.textContent = '后端在线';
    }
  } catch (error) {
    document.querySelector('.conn-status').className = 'conn-status offline';
    document.querySelector('.conn-status').lastChild.textContent = '后端离线';
  }
}

// 启动时检查后端状态
checkBackendStatus();
refreshMemoryRuntimeState({ silent: true });
// 每30秒检查一次
setInterval(checkBackendStatus, 30000);
setInterval(() => refreshMemoryRuntimeState({ silent: true }), MEMORY_RUNTIME_REFRESH_MS);

// 加载聊天记录
loadChatHistory();

}); // 关闭 DOMContentLoaded
</script>
</body>
